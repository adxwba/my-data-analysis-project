name: CI for Data Analysis Project

# Тригери: запуск при кожному push або PR у гілку main [cite: 27, 30]
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    [cite_start]runs-on: ubuntu-latest [cite: 31]

    # Матриця для перевірки на різних версіях Python [cite: 54]
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        [cite_start]uses: actions/checkout@v4 [cite: 33]

      - name: Set up Python ${{ matrix.python-version }}
        [cite_start]uses: actions/setup-python@v5 [cite: 35]
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pylint # Встановлення інструментів для тестів та лінтера [cite: 36]

      - name: Run Linter (Pylint)
        [cite_start]run: pylint **/*.py --exit-zero # Перевірка якості коду [cite: 46, 47]

      - name: Run Tests (Pytest)
        [cite_start]run: pytest [cite: 39]
