name: CI for Data Analysis Project


on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    [cite_start]runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        [cite_start]uses: actions/checkout@v4 

      - name: Set up Python ${{ matrix.python-version }}
        [cite_start]uses: actions/setup-python@v5 
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pylint 

      - name: Run Linter (Pylint)
        [cite_start]run: pylint **/*.py --exit-zero 

      - name: Run Tests (Pytest)
        [cite_start]run: pytest [cite: 39]
